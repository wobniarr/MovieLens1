paths:
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"
  checkpoints_dir: "checkpoints"
  logs_dir: "logs"
  vocab_dir: "data/vocab"

data:
  dataset_url: "https://files.grouplens.org/datasets/movielens/ml-1m.zip"
  dataset_name: "ml-1m"
  min_rating_for_positive: 4  # ratings >= this are positive labels for ranking
  negative_sample_ratio: 4    # 1 positive : N negatives for ranking
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  random_seed: 42

features:
  user_id_embedding_dim: 32
  movie_id_embedding_dim: 32
  gender_embedding_dim: 4
  age_embedding_dim: 8
  occupation_embedding_dim: 8
  genre_embedding_dim: 16
  num_genres: 18

# --- Candidate Generation (Two-Tower) ---
candidate_gen:
  embedding_dim: 128
  user_hidden_dims: [256, 128]
  item_hidden_dims: [256, 128]
  dropout: 0.2
  temperature: 0.07               # for in-batch softmax contrastive loss scaling
  learning_rate: 0.001
  weight_decay: 0.0001
  batch_size: 1024
  num_epochs: 20
  top_k: 100
  early_stopping_patience: 8
  max_history_len: 50             # cap user watch history at N most recent items
  checkpoint_metric: "Recall@20"  # metric to checkpoint/early-stop on (null = val_loss)

ranking:
  hidden_dims: [256, 128, 64]
  cross_feature_dim: 32
  dropout: 0.2
  learning_rate: 0.001
  weight_decay: 0.0001
  batch_size: 512
  num_epochs: 15
  early_stopping_patience: 5
  checkpoint_metric: null         # null = use val_loss

training:
  device: "cuda"
  gradient_clip_norm: 1.0
  use_mixed_precision: false  # set true if GPU supports it
  num_workers: 4              # DataLoader workers (0 = main process)
  # log_every_n_steps: 100   # uncomment to enable mid-epoch logging
  seed: 42

evaluation:
  ks: [5, 10, 20]            # K values for NDCG@K and Recall@K
  eval_chunk_size: 1024       # users per chunk for chunked Recall@K (controls peak RAM)
  num_eval_users: 1000       # subsample users for faster eval (not used currently)
